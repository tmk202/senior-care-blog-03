<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Báo Sức Khỏe - Tin tức tổng hợp</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="top-header">
    <div style="font-size: 30px; font-weight: bold; color: var(--brand-red);">Kênh Sức Khỏe</div>
    <input type="text" placeholder="Tìm kiếm...">
</header>
<nav class="nav-bar">
    <a href="#">SỨC KHỎE</a>
    <a href="#">DINH DƯỠNG</a>
    <a href="#">VẬN ĐỘNG</a>
</nav>

<main class="main-wrapper">
    <section>
        <div class="featured-grid">
            <div class="main-news">
                <img src="https://images.unsplash.com/photo-1544005313-94ddf0286df2?w=800" alt="Main">
                <h3>Bí quyết sống thọ của các cụ ông 90 tuổi</h3>
            </div>
            <div class="side-news">
                <img src="https://via.placeholder.com/200" alt="Side">
                <h4>Cách trị đau xương khớp</h4>
            </div>
        </div>

        <div class="post-list">
            <div class="post-item"><img src="https://via.placeholder.com/200" alt="news"><h4>Tin 1</h4></div>
            <div class="post-item"><img src="https://via.placeholder.com/200" alt="news"><h4>Tin 2</h4></div>
            <div class="post-item"><img src="https://via.placeholder.com/200" alt="news"><h4>Tin 3</h4></div>
        </div>
    </section>

    <aside class="sidebar-widget">
        <h3>Giá vàng hôm nay</h3>
        <table class="price-table">
            <tr><th>Loại</th><th>Mua</th><th>Bán</th></tr>
            <tr><td>SJC</td><td>184,200</td><td>187,200</td></tr>
        </table>
        <div style="margin-top:20px; color:red;">[BIỂU ĐỒ GIÁ VÀNG]</div>
    </aside>
</main>

</body>
</html>
